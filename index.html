<script>
(function(){
  var locked = true;
  try {
    var raw = sessionStorage.getItem('theo_dashboard_unlocked');
    if (raw) {
      var data = JSON.parse(raw);
      if (data && data.ts && (Date.now() - data.ts <= 30 * 60 * 1000)) locked = false;
    }
  } catch (e) {}
  if (locked) document.documentElement.classList.add('theo-locking');
})();
</script>
