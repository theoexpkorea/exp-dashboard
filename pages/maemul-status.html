<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>업무현황</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#2746E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HUB" />
<meta property="og:image" content="../og-image.png" />
<link rel="stylesheet" href="../css/style.css?v=20260722h" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-col">
    <header class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">매물현황</span>
      <a class="topbar-mark" href="../index.html" aria-label="홈으로">the<span class="o">o</span></a>
    </header>

    <div class="content-row">
    <main class="main-content">
      <div class="page-head">
        <h1>매물현황</h1>
        <p>엑셀 대시보드 시트 기준 (열람 전용)</p>
      </div>

      <div class="upload-bar">
        <div class="upload-meta">
          <div class="upload-basedate" id="upload-basedate">업로드된 데이터가 없습니다</div>
        </div>
        <button class="btn-solid" id="upload-btn" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M7 9l5-5 5 5"/><path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg>
          CSV 업로드
        </button>
        <input type="file" id="csv-input" accept=".csv" class="hidden" />
      </div>

      <div id="empty-state" class="upload-empty">
        <strong>아직 업로드된 매물현황 CSV가 없습니다</strong>
        엑셀 대시보드 시트를 CSV로 내보낸 뒤 업로드하면 여기에 표시됩니다.
        <br>
        <button class="btn-solid" id="upload-btn-2" type="button">CSV 업로드</button>
      </div>

      <div id="dash-content" class="hidden">

        <div class="card-grid" id="kpi-grid"></div>

        <div class="data-section grid-tables-3">
          <div>
            <div class="data-section-head"><h2>매물 현황 요약</h2></div>
            <div class="panel">
              <table class="data-table" id="table-status"></table>
            </div>
          </div>
          <div>
            <div class="data-section-head"><h2>공실 현황</h2></div>
            <div class="panel">
              <table class="data-table" id="table-vacancy"></table>
            </div>
          </div>
          <div>
            <div class="data-section-head"><h2>자기계약 누적</h2></div>
            <div class="panel">
              <table class="data-table" id="table-selfcontract"></table>
            </div>
          </div>
        </div>

        <div class="data-section grid-3">
          <div class="panel">
            <h3>거래구분별 건수</h3>
            <div class="chart-wrap"><canvas id="chart-dealtype"></canvas></div>
          </div>
          <div class="panel">
            <h3>매물구분</h3>
            <div class="chart-wrap"><canvas id="chart-listingtype"></canvas></div>
          </div>
          <div class="panel">
            <h3>지역별 매물 현황</h3>
            <div class="chart-wrap"><canvas id="chart-region"></canvas></div>
          </div>
        </div>

        <div class="data-section grid-2">
          <div class="panel">
            <h3>신규 등록 (매물종류별)</h3>
            <div class="chart-wrap"><canvas id="chart-newlistings"></canvas></div>
          </div>
          <div class="panel">
            <h3>월별 신규 등록 추이</h3>
            <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
          </div>
        </div>

        <div class="data-section grid-2">
          <div class="panel">
            <h3>이번 달 신규 광고 (종류별)</h3>
            <div class="chart-wrap"><canvas id="chart-newads"></canvas></div>
          </div>
          <div class="panel">
            <h3>광고 현황 (채널별)</h3>
            <div class="chart-wrap"><canvas id="chart-adchannels"></canvas></div>
          </div>
        </div>

      </div>
    </main>
    <aside class="favorites-panel" data-fav-mount="desktop"></aside>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/lock.js"></script>
<script src="../js/favorites.js"></script>
<script src="../js/maemul-status.js"></script>
<script>
  renderSidebar("maemul", { basePrefix: "../" });
  initLockScreen("../");
</script>
</body>
</html>
