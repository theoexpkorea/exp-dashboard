<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<script>
(function(){
  var locked = true;
  try {
    var raw = sessionStorage.getItem('theo_dashboard_unlocked');
    if (raw) {
      var data = JSON.parse(raw);
      if (data && data.ts && (Date.now() - data.ts <= 30 * 60 * 1000)) locked = false;
    }
  } catch (e) {}
  if (locked) document.documentElement.classList.add('theo-locking');
})();
</script>
<style>html.theo-locking .app-shell{visibility:hidden}</style>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>업무현황</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#2746E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HUB" />
<meta property="og:image" content="../og-image.png" />
<link rel="stylesheet" href="../css/style.css?v=20260724a" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-col">
    <header class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">파밍현황</span>
      <a class="topbar-mark" href="../index.html" aria-label="홈으로">the<span class="o">o</span></a>
    </header>

    <div class="content-row">
    <main class="main-content">
      <div class="page-head">
        <h1>파밍현황</h1>
        <p>파밍서치 실시간 연동 · 날짜별 파밍 이력 캘린더</p>
      </div>

      <div class="rec-kpi-grid" id="statGrid">
        <div class="rec-stat-card tint-total">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.2"/><path d="M8 3v4M16 3v4M3.5 10h17"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statThisMonth">-</div><div class="stat-label">이번 달 파밍</div></div>
        </div>
        <div class="rec-stat-card tint-active">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statDone">-</div><div class="stat-label">파밍완료</div></div>
        </div>
        <div class="rec-stat-card tint-plan">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statPlan">-</div><div class="stat-label">파밍예정</div></div>
        </div>
        <div class="rec-stat-card tint-neutral" id="statTodayCard">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20 3 17V5l6 3m0 12 6-3m-6 3V8m6 9 6 3V8l-6-3m0 12V5m0 0L9 8"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statToday">-</div><div class="stat-label">오늘 파밍</div></div>
        </div>
      </div>

      <div class="farm-scope-row">
        <div class="rec-filters" id="scopeTabs">
          <button class="rec-filter-chip active" data-scope="all">전체파밍</button>
          <button class="rec-filter-chip" data-scope="routine">루틴파밍</button>
          <button class="rec-filter-chip" data-scope="customer">고객파밍</button>
        </div>
      </div>

      <div class="farm-toolbar">
        <button class="farm-tool-btn" id="custListBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-6 6.5-6s6.5 2.7 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15.2 14.3c2.7.4 4.8 2.6 4.8 5.7"/></svg>
          고객조건 보기
        </button>
        <button class="farm-tool-btn" id="refreshBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.3-6.4L21 8M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.3 6.4L3 16m0 5v-5h5"/></svg>
          새로고침
        </button>
        <button class="farm-tool-btn" id="todayBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.2"/><path d="M8 3v4M16 3v4M3.5 10h17"/><circle cx="12" cy="15.2" r="1.6" fill="currentColor" stroke="none"/></svg>
          오늘
        </button>
        <div class="farm-month-nav">
          <button class="farm-nav-btn" id="prevBtn">‹</button>
          <div class="farm-month-label" id="monthLabel">-</div>
          <button class="farm-nav-btn" id="nextBtn">›</button>
        </div>
      </div>

      <div class="farm-cal-card">
        <div class="farm-cal-weekdays">
          <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
        </div>
        <div class="farm-cal-grid" id="calGrid"></div>
        <div class="farm-cal-loading" id="calLoading">불러오는 중...</div>
      </div>

      <div class="farm-legend">
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:var(--accent);"></span>파밍예정</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:#1F7A4D;"></span>파밍완료</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:#9A5B14;"></span>파밍보류</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:var(--text-muted);"></span>파밍취소</div>
      </div>

      <div class="farm-note">날짜 칸을 클릭하면 해당일 파밍 기록이 옆에 열립니다.</div>
    </main>
    <aside class="favorites-panel" data-fav-mount="desktop"></aside>
    </div>
  </div>
</div>

<!-- 등록 FAB -->
<button class="rec-fab" id="addBtn" style="right:24px;bottom:24px;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  파밍 등록
</button>

<!-- 일별 상세 슬라이드 패널 -->
<div class="farm-overlay" id="overlay"></div>
<div class="farm-day-panel" id="dayPanel">
  <div class="farm-dp-head">
    <div><div class="farm-dp-title" id="dpTitle">-</div><div class="farm-dp-sub" id="dpSub">-</div></div>
    <button class="farm-dp-close" id="dpClose">✕</button>
  </div>
  <div class="farm-dp-body" id="dpBody"></div>
  <button class="farm-dp-add" id="dpAdd">＋ 이 날짜에 파밍 기록 추가</button>
</div>

<!-- 등록/수정 모달 -->
<div class="rec-modal-overlay" id="formOverlay">
  <div class="rec-modal">
    <div class="rec-modal-head">
      <h2 id="formTitle">파밍 등록</h2>
      <button class="rec-modal-close" id="formClose">✕</button>
    </div>
    <div class="rec-modal-body">
      <div class="dash-seg" id="fScopeSeg">
        <button type="button" class="on" data-v="routine">루틴 파밍</button>
        <button type="button" data-v="customer">고객 파밍</button>
      </div>

      <div class="rec-form-grid full hidden" id="custPickWrap">
        <div class="rec-field">
          <label>고객 배정</label>
          <div class="dash-picker-wrap">
            <button type="button" class="dash-picker-btn" id="fCustBtn"><span data-role="label">고객 선택</span><span class="car">▾</span></button>
            <div class="dash-select-pop" id="fCustPop"></div>
          </div>
        </div>
      </div>

      <div class="rec-form-grid full">
        <div class="rec-field">
          <label>파밍일자</label>
          <button type="button" class="dash-picker-btn" id="fDateBtn"><span data-role="label" id="fDateLabel"></span><span class="car">▾</span></button>
        </div>
      </div>

      <div class="rec-form-grid full">
        <div class="rec-field">
          <label>매물 링크</label>
          <input type="text" id="fLink" placeholder="네이버 매물번호 또는 전체 URL(디스코·밸류맵 등)">
          <div class="form-hint-text">숫자만 입력하면 네이버부동산 링크로 자동 변환됩니다</div>
        </div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>건물명</label><input type="text" id="fName" placeholder="예: 동양섬유사옥"></div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>주소</label><input type="text" id="fAddr" placeholder="예: 서울특별시 중구 신당동 421-5"></div>
      </div>

      <div class="rec-form-grid">
        <div class="rec-field">
          <label>유형</label>
          <div class="dash-picker-wrap">
            <button type="button" class="dash-picker-btn" id="fTypeBtn"><span data-role="label">사무실</span><span class="car">▾</span></button>
            <div class="dash-select-pop" id="fTypePop"></div>
          </div>
        </div>
        <div class="rec-field">
          <label>거래유형</label>
          <div class="dash-picker-wrap">
            <button type="button" class="dash-picker-btn" id="fDealBtn"><span data-role="label">월세</span><span class="car">▾</span></button>
            <div class="dash-select-pop" id="fDealPop"></div>
          </div>
        </div>
      </div>

      <div class="rec-form-grid" style="grid-template-columns:1fr 1fr 1fr;">
        <div class="rec-field"><label>층수</label><input type="text" id="fFloor" placeholder="4"></div>
        <div class="rec-field"><label>총층</label><input type="text" id="fFloorAll" placeholder="8"></div>
        <div class="rec-field"><label>전용면적(평)</label><input type="text" id="fArea" placeholder="55"></div>
      </div>
      <div class="rec-form-grid" style="grid-template-columns:1fr 1fr 1fr;">
        <div class="rec-field"><label id="fDepositLabel">보증금/매매가(만)</label><input type="text" id="fDeposit" placeholder="5000"></div>
        <div class="rec-field"><label>월세(만)</label><input type="text" id="fRent" placeholder="400"></div>
        <div class="rec-field"><label>관리비(만)</label><input type="text" id="fMgmt" placeholder="225"></div>
      </div>

      <div class="rec-form-grid full">
        <div class="rec-field"><label>특징/메모</label><textarea id="fMemo" placeholder="주차 가능, 컨디션 양호 등"></textarea></div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>파밍메모</label><textarea id="fFarmMemo" placeholder="현장 확인 사항, 진행 상황 등"></textarea></div>
      </div>

      <div class="rec-form-grid">
        <div class="rec-field"><label>등록일자</label><input type="text" id="fRegDate" placeholder="예: 2026-07-20"></div>
        <div class="rec-field"><label>매물장번호</label><input type="text" id="fLedger" placeholder="예: 25-013"></div>
      </div>

      <div class="rec-modal-error" id="formError"></div>
    </div>
    <div class="rec-modal-foot">
      <button class="btn-danger-outline hidden" id="formDelete">삭제</button>
      <button class="btn-soft" id="formCancel" style="margin-left:auto;">취소</button>
      <button class="btn-solid" id="formSave" style="margin-left:0;background:var(--accent);">저장</button>
    </div>
  </div>
</div>

<!-- 고객조건 보기 -->
<div class="rec-modal-overlay" id="custOverlay">
  <div class="rec-modal" style="max-width:420px;">
    <div class="rec-modal-head">
      <h2 id="custModalTitle">고객조건 보기</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-soft" id="custAddBtn" style="padding:6px 12px;font-size:12.5px;color:var(--accent);display:flex;align-items:center;gap:5px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          고객 추가
        </button>
        <button class="rec-modal-close" id="custModalClose">✕</button>
      </div>
    </div>
    <div class="rec-modal-body" id="custModalBody"></div>
  </div>
</div>

<!-- 고객 추가/수정 -->
<div class="rec-modal-overlay" id="custFormOverlay">
  <div class="rec-modal" style="max-width:420px;">
    <div class="rec-modal-head">
      <h2 id="custFormTitle">고객 추가</h2>
      <button class="rec-modal-close" id="custFormClose">✕</button>
    </div>
    <div class="rec-modal-body">
      <div class="rec-form-grid">
        <div class="rec-field">
          <label>고객ID</label>
          <input type="text" id="cfId" name="x-dash-custid" placeholder="예: SH-0009" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly>
          <div class="form-hint-text" id="cfIdHint">비워두면 자동 채번됩니다 (예: C0001)</div>
        </div>
        <div class="rec-field">
          <label>고객구분</label>
          <input type="text" id="cfKind" name="x-dash-custkind" list="cfKindList" placeholder="예: SH, CU" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly>
          <datalist id="cfKindList"><option value="SH"><option value="CU"></datalist>
        </div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>고객명</label><input type="text" id="cfName" name="x-dash-custname" placeholder="예: 홍길동" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
      </div>
      <div class="rec-form-grid">
        <div class="rec-field"><label>연락처</label><input type="text" id="cfPhone" name="x-dash-custphone" placeholder="예: 010-1234-5678" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
        <div class="rec-field"><label>희망 지역</label><input type="text" id="cfArea" name="x-dash-custarea" placeholder="예: 서울" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field">
          <label>희망 거래유형</label>
          <div class="dash-picker-wrap">
            <button type="button" class="dash-picker-btn" id="cfDealBtn"><span data-role="label">무관</span><span class="car">▾</span></button>
            <div class="dash-select-pop" id="cfDealPop"></div>
          </div>
        </div>
      </div>
      <div class="rec-form-grid">
        <div class="rec-field"><label>평수(최소)</label><input type="text" id="cfPyMin" name="x-dash-pymin" placeholder="20" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
        <div class="rec-field"><label>평수(최대)</label><input type="text" id="cfPyMax" name="x-dash-pymax" placeholder="40" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
      </div>
      <div class="rec-form-grid">
        <div class="rec-field"><label>예산 보증금/매매가(만)</label><input type="text" id="cfBudgetDeposit" name="x-dash-budgetdep" placeholder="10000" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
        <div class="rec-field"><label>예산 월세(만)</label><input type="text" id="cfBudgetRent" name="x-dash-budgetrent" placeholder="300" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>희망 층수</label><input type="text" id="cfFloor" name="x-dash-custfloor" placeholder="예: 1~3층" autocomplete="off" data-lpignore="true" data-form-type="other" autocorrect="off" spellcheck="false" readonly></div>
      </div>
      <div class="rec-form-grid full">
        <div class="rec-field"><label>기타 요청사항</label><textarea id="cfEtc" placeholder="주차, 방향 등 기타 조건"></textarea></div>
      </div>
      <div class="rec-modal-error" id="custFormError"></div>
    </div>
    <div class="rec-modal-foot">
      <button class="btn-soft" id="custFormCancel" style="margin-left:auto;">취소</button>
      <button class="btn-solid" id="custFormSave" style="margin-left:0;background:var(--accent);">저장</button>
    </div>
  </div>
</div>

<div class="rec-toast" id="toast"></div>

<script src="../js/sidebar.js"></script>
<script src="../js/lock.js"></script>
<script src="../js/favorites.js"></script>
<script src="../js/dash-widgets.js"></script>
<script src="../js/farming-status.js"></script>
<script>
  renderSidebar("farming", { basePrefix: "../" });
  initLockScreen("../");
</script>
</body>
</html>
