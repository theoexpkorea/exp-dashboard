<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>업무현황</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#2746E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HUB" />
<meta property="og:image" content="../og-image.png" />
<link rel="stylesheet" href="../css/style.css?v=20260722h" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-col">
    <header class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">추천매물</span>
      <a class="topbar-mark" href="../index.html" aria-label="홈으로">the<span class="o">o</span></a>
    </header>

    <div class="content-row">
    <main class="main-content">
      <div class="page-head">
        <h1>추천매물</h1>
        <p>고객 탭 · 추천멘트 탭 실시간 연동</p>
      </div>

      <!-- 진행현황 -->
      <div class="rec-kpi-grid">
        <div class="rec-stat-card tint-total">
          <div class="icon-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-6 6.5-6s6.5 2.7 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15.2 14.3c2.7.4 4.8 2.6 4.8 5.7"/></svg></div>
          <div class="rec-stat-body">
            <div class="stat" id="rec-kpi-total">-</div>
            <div class="stat-label">전체 고객</div>
          </div>
        </div>
        <div class="rec-stat-card tint-active">
          <div class="icon-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12h4l2.2-7 4.6 14 2.2-7h5.5"/></svg></div>
          <div class="rec-stat-body">
            <div class="stat" id="rec-kpi-active">-</div>
            <div class="stat-label">진행중 (종료 제외)</div>
          </div>
        </div>
      </div>

      <!-- 검색 + 필터 -->
      <div class="rec-toolbar">
        <input type="text" id="rec-search" class="rec-search" placeholder="이름 · 접속코드 검색" autocomplete="off" data-lpignore="true" />
        <div class="rec-filters">
          <button class="rec-filter-chip active" data-filter="all">전체</button>
          <button class="rec-filter-chip" data-filter="active">진행중</button>
          <button class="rec-filter-chip" data-filter="ended">종료</button>
        </div>
      </div>

      <!-- 목록 -->
      <div class="rec-table-wrap">
        <div class="rec-table-scroll">
        <table class="rec-table">
          <thead>
            <tr>
              <th>고객</th>
              <th class="col-center">상태</th>
              <th class="col-center">추천매물</th>
              <th class="col-center">My Maps</th>
              <th class="col-right">관리</th>
            </tr>
          </thead>
          <tbody id="rec-tbody">
            <tr><td colspan="5" class="rec-empty">불러오는 중…</td></tr>
          </tbody>
        </table>
        </div>
      </div>
    </main>
    <aside class="favorites-panel" data-fav-mount="desktop"></aside>
    </div>
  </div>
</div>

<!-- 등록/수정 FAB -->
<button class="rec-fab" id="rec-fab">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  추천매물 등록
</button>

<!-- 등록/수정 모달 -->
<div class="rec-modal-overlay" id="rec-modal-overlay">
  <div class="rec-modal">
    <div class="rec-modal-head">
      <h2 id="rec-modal-title">추천매물 등록</h2>
      <button class="rec-modal-close" id="rec-modal-close">✕</button>
    </div>
    <div class="rec-modal-body">
      <input type="hidden" id="rec-f-row" />

      <div class="rec-form-grid">
        <div class="rec-field">
          <label>고객명(표시 이름)</label>
          <input type="text" id="rec-f-name" placeholder="예: 신경외과 원장" autocomplete="off" data-lpignore="true" />
        </div>
        <div class="rec-field">
          <label>접속코드</label>
          <input type="text" id="rec-f-access" placeholder="예: CU-0001" autocomplete="off" data-lpignore="true" />
        </div>
        <div class="rec-field">
          <label>고객코드 (선택, 비우면 접속코드로 대체)</label>
          <input type="text" id="rec-f-code" placeholder="예: CU-0001" autocomplete="off" data-lpignore="true" />
        </div>
        <div class="rec-field">
          <label>구분</label>
          <select id="rec-f-type" data-dash-select>
            <option value="중개사">중개사 (문의 버튼 숨김)</option>
            <option value="고객">고객 (문의 버튼 노출)</option>
          </select>
        </div>
      </div>

      <div class="rec-form-grid">
        <div class="rec-field">
          <label>구글 My Maps — 편집용 링크</label>
          <input type="url" id="rec-f-map-edit" placeholder="https://www.google.com/maps/d/u/0/edit?..." autocomplete="off" data-lpignore="true" />
        </div>
        <div class="rec-field">
          <label>구글 My Maps — 미리보기용 링크</label>
          <input type="url" id="rec-f-map-preview" placeholder="https://www.google.com/maps/d/u/1/viewer?..." autocomplete="off" data-lpignore="true" />
        </div>
      </div>

      <div class="rec-toggle-grid">
        <label class="rec-toggle danger-toggle"><input type="checkbox" id="rec-f-ended" /> 종료 (링크 접속 차단)</label>
        <label class="rec-toggle"><input type="checkbox" id="rec-f-hideTrade" /> 상권점포수 숨김</label>
        <label class="rec-toggle"><input type="checkbox" id="rec-f-hideProposal" /> 매물제안서 숨김</label>
        <label class="rec-toggle"><input type="checkbox" id="rec-f-hideEum" /> 토지이음웹 숨김</label>
        <label class="rec-toggle"><input type="checkbox" id="rec-f-hideSemas" /> 소상공인365 숨김</label>
        <label class="rec-toggle"><input type="checkbox" id="rec-f-hideTradeReport" /> 상권리포트 숨김</label>
      </div>

      <div class="rec-notes-head">
        <h3>추천 매물 · 멘트</h3>
        <button type="button" class="rec-add-note-btn" id="rec-add-note-btn">+ 매물 추가</button>
      </div>
      <div id="rec-notes-list"></div>

      <div class="rec-modal-error" id="rec-modal-error"></div>
    </div>
    <div class="rec-modal-foot">
      <button class="btn-danger-outline hidden" id="rec-delete-btn">삭제</button>
      <button class="btn-soft" id="rec-cancel-btn" style="margin-left:auto;">취소</button>
      <button class="btn-solid" id="rec-save-btn" style="margin-left:0;">저장</button>
    </div>
  </div>
</div>

<div class="rec-toast" id="rec-toast"></div>

<script src="../js/sidebar.js"></script>
<script src="../js/lock.js"></script>
<script src="../js/favorites.js"></script>
<script src="../js/dash-widgets.js"></script>
<script src="../js/recommend-management.js"></script>
<script>
  renderSidebar("recommend", { basePrefix: "../" });
  initLockScreen("../");
</script>
</body>
</html>
