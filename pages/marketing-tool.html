<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<script>
(function(){
  var locked = true;
  try {
    var raw = sessionStorage.getItem('theo_dashboard_unlocked');
    if (raw) {
      var data = JSON.parse(raw);
      if (data && data.ts && (Date.now() - data.ts <= 30 * 60 * 1000)) locked = false;
    }
  } catch (e) {}
  if (locked) document.documentElement.classList.add('theo-locking');
})();
</script>
<style>html.theo-locking .app-shell{visibility:hidden}</style>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>업무현황</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#2746E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HUB" />
<meta property="og:image" content="../og-image.png" />
<link rel="stylesheet" href="../css/style.css?v=20260724a" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-col">
    <header class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">마케팅툴</span>
      <a class="topbar-mark" href="../index.html" aria-label="홈으로">the<span class="o">o</span></a>
    </header>

    <div class="content-row">
    <main class="main-content">
      <div class="page-head">
        <h1>마케팅툴</h1>
        <p>매물 정보로 블로그·인스타·네이버광고 카피 생성</p>
      </div>

      <div class="mkt-quicklinks" id="mktQuicklinks"></div>

      <div class="farm-scope-row">
        <div class="rec-filters" id="formatTabs">
          <button class="rec-filter-chip active" data-format="blog">블로그</button>
          <button class="rec-filter-chip" data-format="insta">인스타</button>
          <button class="rec-filter-chip" data-format="naver">네이버광고</button>
        </div>
      </div>

      <div class="mkt-layout">
        <div class="mkt-card">
          <div class="mkt-field">
            <label>매물 특징</label>
            <textarea id="mktPrompt" placeholder="예: 강남역 도보 5분 상가 1층, 전면 통유리, 실평수 25평, 권리금 없음, 주차 2대 가능..."></textarea>
          </div>

          <div class="mkt-field" id="mktPhotoField">
            <label>사진 첨부 <span class="mkt-field-note">여러 장 가능 · AI가 순서를 제안하고, 제안대로 파일명 정리해서 다운로드할 수 있어요</span></label>
            <div class="mkt-dropzone" id="mktDropzone">
              <input type="file" id="mktFileInput" accept="image/*" multiple hidden>
              <div class="mkt-dropzone-inner" id="mktDropzoneInner">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="9" cy="9" r="1.8"/><path d="m21 15-5.5-5.5L4 21"/></svg>
                <span>클릭 또는 드래그해서 사진 추가</span>
              </div>
            </div>
            <div class="mkt-photo-grid" id="mktPhotoGrid"></div>
          </div>

          <div class="mkt-field" id="mktNaverField" style="display:none;">
            <label>네이버광고 고정 양식 <span class="mkt-field-note">여기서 수정하면 다음 생성부터 이 양식으로 카피가 만들어집니다</span></label>
            <textarea id="mktNaverTemplate" placeholder="사용 중인 네이버광고 고정 양식을 붙여넣어 주세요"></textarea>
            <button class="btn-soft" id="mktSaveTemplate" style="margin-top:8px;">양식 저장</button>
          </div>

          <div class="mkt-field">
            <label>생성 모델</label>
            <div class="mkt-model-toggle" id="mktModelToggle">
              <button class="mkt-model-btn" data-model="haiku">Haiku <span>빠르고 저렴</span></button>
              <button class="mkt-model-btn" data-model="sonnet">Sonnet <span>더 정교함</span></button>
            </div>
          </div>

          <button class="btn-solid mkt-generate-btn" id="mktGenerateBtn" style="background:var(--accent);">
            <span id="mktGenerateLabel">생성</span>
          </button>
          <div class="mkt-error" id="mktError"></div>
        </div>

        <div class="mkt-card mkt-output-card">
          <div class="mkt-output-head">
            <span>생성 결과</span>
            <div class="mkt-output-actions">
              <button class="btn-soft" id="mktDownloadBtn" style="display:none;">사진 다운로드</button>
              <button class="btn-soft" id="mktCopyBtn" disabled>복사</button>
            </div>
          </div>
          <div class="mkt-output-body" id="mktOutputBody">
            <div class="mkt-output-empty" id="mktOutputEmpty">매물 특징을 입력하고 생성 버튼을 눌러주세요.</div>
            <div class="mkt-output-loading hidden" id="mktOutputLoading">
              <div class="mkt-spinner"></div>
              <span id="mktLoadingLabel">생성 중…</span>
            </div>
            <pre class="mkt-output-text hidden" id="mktOutputText"></pre>
          </div>
        </div>
      </div>
    </main>
    <aside class="favorites-panel" data-fav-mount="desktop"></aside>
    </div>
  </div>
</div>

<div class="rec-toast" id="toast"></div>

<script src="../js/sidebar.js"></script>
<script src="../js/lock.js"></script>
<script src="../js/favorites.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="../js/marketing-tool.js"></script>
<script>
  renderSidebar("marketing", { basePrefix: "../" });
  initLockScreen("../");
</script>
</body>
</html>
