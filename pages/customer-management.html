<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>업무현황</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="manifest" href="../manifest.json" />
<meta name="theme-color" content="#2746E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HUB" />
<meta property="og:image" content="../og-image.png" />
<link rel="stylesheet" href="../css/style.css?v=20260722h" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-col">
    <header class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title">고객관리</span>
      <a class="topbar-mark" href="../index.html" aria-label="홈으로">the<span class="o">o</span></a>
    </header>

    <div class="content-row">
    <main class="main-content">
      <div class="page-head">
        <h1>고객관리</h1>
        <p>매도임대·가망고객·계약고객 CRM 실시간 연동 · 다음연락일 기준 통합 캘린더</p>
      </div>

      <div class="rec-kpi-grid" id="statGrid">
        <div class="rec-stat-card tint-urgent">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statToday">-</div><div class="stat-label">Today 처리</div></div>
        </div>
        <div class="rec-stat-card tint-sale">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statSale">-</div><div class="stat-label">매도임대</div></div>
        </div>
        <div class="rec-stat-card tint-lead">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statLead">-</div><div class="stat-label">가망고객</div></div>
        </div>
        <div class="rec-stat-card tint-contract">
          <div class="icon-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div class="rec-stat-body"><div class="stat" id="statContract">-</div><div class="stat-label">계약고객</div></div>
        </div>
      </div>

      <div class="farm-scope-row">
        <div class="rec-filters" id="scopeTabs">
          <button class="rec-filter-chip active" data-scope="all">전체</button>
          <button class="rec-filter-chip" data-scope="SALE">매도임대</button>
          <button class="rec-filter-chip" data-scope="LEAD">가망고객</button>
          <button class="rec-filter-chip" data-scope="CONTRACT">계약고객</button>
        </div>
      </div>

      <div class="farm-toolbar">
        <button class="farm-tool-btn" id="refreshBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.3-6.4L21 8M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.3 6.4L3 16m0 5v-5h5"/></svg>
          새로고침
        </button>
        <button class="farm-tool-btn" id="todayBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.2"/><path d="M8 3v4M16 3v4M3.5 10h17"/><circle cx="12" cy="15.2" r="1.6" fill="currentColor" stroke="none"/></svg>
          오늘
        </button>
        <div class="farm-month-nav">
          <button class="farm-nav-btn" id="prevBtn">‹</button>
          <div class="farm-month-label" id="monthLabel">-</div>
          <button class="farm-nav-btn" id="nextBtn">›</button>
        </div>
      </div>

      <div class="farm-cal-card">
        <div class="farm-cal-weekdays">
          <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
        </div>
        <div class="farm-cal-grid" id="calGrid"></div>
        <div class="farm-cal-loading" id="calLoading">불러오는 중...</div>
      </div>

      <div class="farm-legend">
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:#1D5FBF;"></span>매도임대</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:#12805E;"></span>가망고객</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:#6A3FB0;"></span>계약고객</div>
        <div class="farm-legend-item"><span class="farm-legend-swatch" style="background:var(--danger);"></span>다음연락일 지남</div>
      </div>

      <div class="farm-note">날짜 칸을 클릭하면 해당일이 다음연락일인 고객이 옆에 열립니다. 연락 처리하면 다음연락일은 저장 시 자동 재계산됩니다.</div>
    </main>
    <aside class="favorites-panel" data-fav-mount="desktop"></aside>
    </div>
  </div>
</div>

<!-- 고객 등록 FAB -->
<button class="rec-fab" id="addBtn" style="right:24px;bottom:24px;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  고객 등록
</button>

<!-- 일별 상세 슬라이드 패널 -->
<div class="farm-overlay" id="overlay"></div>
<div class="farm-day-panel" id="dayPanel">
  <div class="farm-dp-head">
    <div><div class="farm-dp-title" id="dpTitle">-</div><div class="farm-dp-sub" id="dpSub">-</div></div>
    <button class="farm-dp-close" id="dpClose">✕</button>
  </div>
  <div class="farm-dp-body" id="dpBody"></div>
</div>

<!-- 등록/수정 모달 -->
<div class="rec-modal-overlay" id="formOverlay">
  <div class="rec-modal">
    <div class="rec-modal-head">
      <h2 id="formTitle">고객 등록</h2>
      <button class="rec-modal-close" id="formClose">✕</button>
    </div>
    <div class="rec-modal-body">
      <div class="dash-seg" id="fCatSeg">
        <button type="button" class="on" data-v="SALE">매도임대</button>
        <button type="button" data-v="LEAD">가망고객</button>
        <button type="button" data-v="CONTRACT">계약고객</button>
      </div>
      <div id="formFields"></div>
      <div class="rec-modal-error" id="formError"></div>
    </div>
    <div class="rec-modal-foot">
      <button class="btn-soft" id="formCancel" style="margin-left:auto;">취소</button>
      <button class="btn-solid" id="formSave" style="margin-left:0;background:var(--accent);">저장</button>
    </div>
  </div>
</div>

<div class="rec-toast" id="toast"></div>

<script src="../js/sidebar.js"></script>
<script src="../js/lock.js"></script>
<script src="../js/favorites.js"></script>
<script src="../js/dash-widgets.js"></script>
<script src="../js/customer-management.js"></script>
<script>
  renderSidebar("customer", { basePrefix: "../" });
  initLockScreen("../");
</script>
</body>
</html>
